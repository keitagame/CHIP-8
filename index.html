<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>CHIP-8</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      @font-face {
  font-family: "Renner";
  src: url("./Renner.ttf") format("truetype");
  font-display: swap;
 
}
      :root { color-scheme: light dark; }
      body {
        background: rgb(0,0,0);
        font-family: "Renner";
        margin: 0; padding: 0;
      }
      h1 { font-weight: 300; font-size: 25px; }
      header {
        display: flex; gap: 12px; align-items: center; margin-bottom: 12px;
      }
      canvas {
        height: 100%;
        aspect-ratio: 160 / 144;
        image-rendering: pixelated;
        border: 1px solid #000000;
        background: #000;
      }
      .row {
        padding-top: 0px; height: 83vh;
        justify-content: center; display: flex;
        gap: 12px; align-items: center;
      }
      .mono { font-size: 20px; }
      small { opacity: 0.7; }
      button {
        font-family: sans-serif; padding: 10px;
        background: rgb(0,0,0); color: rgb(255,255,255);
        border: 1px solid rgb(255,255,255); cursor: pointer;
      }
      .file-input { display: none; }
      .file-label {
        display: inline-block; padding: 10px 16px;
        background: #000000; color: white;
        border: 1px solid white; border-radius: 0px;
        cursor: pointer; font-size: 14px; transition: background 0.2s;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>CHIP-8</h1>
      <label class="file-label">
        Select
        <input id="rom" type="file" class="file-input" />
      </label>
      <span id="file-name"></span>
      <button id="fullscreenBtn">Fullscreen</button>
      <button id="start">Start</button>
      <div class="mono" id="status">Waiting...</div>
      <div>
        <span class="mono">CPU PC:</span>
        <span id="pc" class="mono">0x0000</span>
      </div>
    </header>
    <div class="row">
      <canvas id="screen" width="64" height="32"></canvas>
      <div style="display:none">
        <div><b>FPS:</b> <span id="fps">0</span></div>
        <div><b>Cycles:</b> <span id="cyc" class="mono">0</span></div>
      </div>
    </div>

    <script>
      const canvas = document.getElementById('screen');
      const ctx = canvas.getContext('2d');
      const MEMORY_SIZE = 4096;
      const DISPLAY_WIDTH = 64;
      const DISPLAY_HEIGHT = 32;
      const REGISTER_COUNT = 16;
      const STACK_SIZE = 16;

      // フォントセット
      const FONTSET = [
        0xF0, 0x90, 0x90, 0x90, 0xF0, // 0
        0x20, 0x60, 0x20, 0x20, 0x70, // 1
        0xF0, 0x10, 0xF0, 0x80, 0xF0, // 2
        0xF0, 0x10, 0xF0, 0x10, 0xF0, // 3
        0x90, 0x90, 0xF0, 0x10, 0x10, // 4
        0xF0, 0x80, 0xF0, 0x10, 0xF0, // 5
        0xF0, 0x80, 0xF0, 0x90, 0xF0, // 6
        0xF0, 0x10, 0x20, 0x40, 0x40, // 7
        0xF0, 0x90, 0xF0, 0x90, 0xF0, // 8
        0xF0, 0x90, 0xF0, 0x10, 0xF0, // 9
        0xF0, 0x90, 0xF0, 0x90, 0x90, // A
        0xE0, 0x90, 0xE0, 0x90, 0xE0, // B
        0xF0, 0x80, 0x80, 0x80, 0xF0, // C
        0xE0, 0x90, 0x90, 0x90, 0xE0, // D
        0xF0, 0x80, 0xF0, 0x80, 0xF0, // E
        0xF0, 0x80, 0xF0, 0x80, 0x80, // F
      ];

      // キーボードマッピング (PCキー -> CHIP-8キー)
      const KEYMAP = {
        '1': 0x1, '2': 0x2, '3': 0x3, '4': 0xC,
        'q': 0x4, 'w': 0x5, 'e': 0x6, 'r': 0xD,
        'a': 0x7, 's': 0x8, 'd': 0x9, 'f': 0xE,
        'z': 0xA, 'x': 0x0, 'c': 0xB, 'v': 0xF
      };

      class CHIP8 {
        constructor() {
          this.memory = new Uint8Array(MEMORY_SIZE);
          this.display = new Uint8Array(DISPLAY_WIDTH * DISPLAY_HEIGHT);
          this.v = new Uint8Array(REGISTER_COUNT);
          this.i = 0;
          this.pc = 0x200;
          this.stack = new Uint16Array(STACK_SIZE);
          this.sp = 0;
          this.delay_timer = 0;
          this.sound_timer = 0;
          this.keys = new Uint8Array(16);
          this.waitingForKey = false;
          this.waitingForKeyRegister = null;
          this.paused = true;
          this.speed = 10; // 1フレームあたりの実行命令数
          
          // サウンド用
          this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        reset() {
          this.memory.fill(0);
          this.display.fill(0);
          this.v.fill(0);
          this.i = 0;
          this.pc = 0x200;
          this.stack.fill(0);
          this.sp = 0;
          this.delay_timer = 0;
          this.sound_timer = 0;
          this.keys.fill(0);
          this.waitingForKey = false;
          this.paused = true;

          // フォントのロード
          for (let i = 0; i < FONTSET.length; i++) {
            this.memory[i] = FONTSET[i];
          }
          
          // 画面クリア
          this.print_display();
          this.update_status("Ready");
        }

        load_rom(data) {
          this.reset();
          if (data.length > MEMORY_SIZE - 0x200) {
            alert("ROM size too large!");
            return;
          }
          for (let i = 0; i < data.length; i++) {
            this.memory[0x200 + i] = data[i];
          }
          this.update_status("Loaded");
          this.update_pc_display();
        }

        update_status(msg) {
          document.getElementById('status').innerText = msg;
        }
        
        update_pc_display() {
          document.getElementById('pc').innerText = '0x' + this.pc.toString(16).toUpperCase().padStart(4, '0');
        }

        play_sound() {
            if (this.audioCtx && this.audioCtx.state === 'suspended') {
                this.audioCtx.resume();
            }
            const osc = this.audioCtx.createOscillator();
            const gain = this.audioCtx.createGain();
            osc.connect(gain);
            gain.connect(this.audioCtx.destination);
            osc.type = 'square';
            osc.frequency.value = 440;
            gain.gain.value = 0.1;
            osc.start();
            setTimeout(() => osc.stop(), 50); // 短いビープ
        }

        // 命令実行サイクル
        cycle() {
          if (this.paused) return;

          // CPUサイクル (1フレームに複数回実行)
          for (let i = 0; i < this.speed; i++) {
            if (!this.waitingForKey) {
                let opcode = (this.memory[this.pc] << 8) | this.memory[this.pc + 1];
                this.execute(opcode);
                if (this.paused) break; // 実行中に停止された場合
            }
          }

          // タイマー更新 (1フレームに1回 = 60Hz)
          if (!this.paused) {
            this.update_timers();
          }

          this.print_display();
          this.update_pc_display();
        }

        update_timers() {
          if (this.delay_timer > 0) this.delay_timer--;
          if (this.sound_timer > 0) {
            this.sound_timer--;
            // 音を鳴らす（連続再生を防ぐため1以上のとき鳴らし続ける等の制御が可能だが、簡易的に0になったら止める等のロジック）
            if (this.sound_timer === 1) this.play_sound();
          }
        }

        execute(opcode) {
          this.pc += 2;

          let x = (opcode & 0x0F00) >> 8;
          let y = (opcode & 0x00F0) >> 4;
          let nn = opcode & 0x00FF;
          let nnn = opcode & 0x0FFF;

          switch (opcode & 0xF000) {
            case 0x0000:
              switch (opcode) {
                case 0x00E0: // CLS
                  this.display.fill(0);
                  break;
                case 0x00EE: // RET
                  this.sp--;
                  this.pc = this.stack[this.sp];
                  break;
              }
              break;

            case 0x1000: // JP addr
              this.pc = nnn;
              break;

            case 0x2000: // CALL addr
              this.stack[this.sp] = this.pc;
              this.sp++;
              this.pc = nnn;
              break;

            case 0x3000: // SE Vx, byte
              if (this.v[x] === nn) this.pc += 2;
              break;

            case 0x4000: // SNE Vx, byte
              if (this.v[x] !== nn) this.pc += 2;
              break;

            case 0x5000: // SE Vx, Vy
              if (this.v[x] === this.v[y]) this.pc += 2;
              break;

            case 0x6000: // LD Vx, byte
              this.v[x] = nn;
              break;

            case 0x7000: // ADD Vx, byte
              this.v[x] = (this.v[x] + nn) & 0xFF;
              break;

            case 0x8000:
              switch (opcode & 0x000F) {
                case 0x0: this.v[x] = this.v[y]; break;
                case 0x1: this.v[x] |= this.v[y]; break;
                case 0x2: this.v[x] &= this.v[y]; break;
                case 0x3: this.v[x] ^= this.v[y]; break;
                case 0x4: // ADD Vx, Vy (Set VF = carry)
                  {
                    let sum = this.v[x] + this.v[y];
                    this.v[0xF] = (sum > 0xFF) ? 1 : 0;
                    this.v[x] = sum & 0xFF;
                  }
                  break;
                case 0x5: // SUB Vx, Vy (Set VF = NOT borrow)
                  this.v[0xF] = (this.v[x] >= this.v[y]) ? 1 : 0;
                  this.v[x] = (this.v[x] - this.v[y]) & 0xFF;
                  break;
                case 0x6: // SHR Vx
                  this.v[0xF] = this.v[x] & 0x1;
                  this.v[x] >>= 1;
                  break;
                case 0x7: // SUBN Vx, Vy
                  this.v[0xF] = (this.v[y] >= this.v[x]) ? 1 : 0;
                  this.v[x] = (this.v[y] - this.v[x]) & 0xFF;
                  break;
                case 0xE: // SHL Vx
                  this.v[0xF] = (this.v[x] & 0x80) >> 7;
                  this.v[x] = (this.v[x] << 1) & 0xFF;
                  break;
              }
              break;

            case 0x9000: // SNE Vx, Vy
              if (this.v[x] !== this.v[y]) this.pc += 2;
              break;

            case 0xA000: // LD I, addr
              this.i = nnn;
              break;

            case 0xB000: // JP V0, addr
              this.pc = nnn + this.v[0];
              break;

            case 0xC000: // RND Vx, byte
              this.v[x] = Math.floor(Math.random() * 256) & nn;
              break;

            case 0xD000: // DRW Vx, Vy, nibble
              {
                let xCoord = this.v[x] % DISPLAY_WIDTH;
                let yCoord = this.v[y] % DISPLAY_HEIGHT;
                this.v[0xF] = 0;

                for (let row = 0; row < (opcode & 0x000F); row++) {
                  if (yCoord + row >= DISPLAY_HEIGHT) continue;
                  let spriteByte = this.memory[this.i + row];

                  for (let col = 0; col < 8; col++) {
                    if (xCoord + col >= DISPLAY_WIDTH) continue;
                    let pixel = (spriteByte >> (7 - col)) & 1;
                    if (pixel === 1) {
                      let idx = (yCoord + row) * DISPLAY_WIDTH + (xCoord + col);
                      if (this.display[idx] === 1) {
                        this.v[0xF] = 1;
                      }
                      this.display[idx] ^= 1;
                    }
                  }
                }
              }
              break;

            case 0xE000:
              switch (nn) {
                case 0x9E: // SKP Vx
                  if (this.keys[this.v[x]]) this.pc += 2;
                  break;
                case 0xA1: // SKNP Vx
                  if (!this.keys[this.v[x]]) this.pc += 2;
                  break;
              }
              break;

            case 0xF000:
              switch (nn) {
                case 0x07: // LD Vx, DT
                  this.v[x] = this.delay_timer;
                  break;
                case 0x0A: // LD Vx, K (Wait for key)
                  this.waitingForKey = true;
                  this.waitingForKeyRegister = x;
                  break;
                case 0x15: // LD DT, Vx
                  this.delay_timer = this.v[x];
                  break;
                case 0x18: // LD ST, Vx
                  this.sound_timer = this.v[x];
                  break;
                case 0x1E: // ADD I, Vx
                  this.i = (this.i + this.v[x]) & 0xFFF;
                  break;
                case 0x29: // LD F, Vx
                  this.i = this.v[x] * 5;
                  break;
                case 0x33: // LD B, Vx
                  this.memory[this.i] = Math.floor(this.v[x] / 100);
                  this.memory[this.i + 1] = Math.floor((this.v[x] % 100) / 10);
                  this.memory[this.i + 2] = this.v[x] % 10;
                  break;
                case 0x55: // LD [I], Vx
                  for (let k = 0; k <= x; k++) {
                    this.memory[this.i + k] = this.v[k];
                  }
                  break;
                case 0x65: // LD Vx, [I]
                  for (let k = 0; k <= x; k++) {
                     this.v[k] = this.memory[this.i + k];
                  }
                  break;
              }
              break;
          }
        }

        print_display() {
          const imgData = ctx.createImageData(DISPLAY_WIDTH, DISPLAY_HEIGHT);
          const data = imgData.data;

          for (let i = 0; i < this.display.length; i++) {
            const pixel = this.display[i];
            const color = pixel ? 255 : 0;
            // R, G, B, A
            data[i * 4] = color;
            data[i * 4 + 1] = color;
            data[i * 4 + 2] = color;
            data[i * 4 + 3] = 255;
          }
          ctx.putImageData(imgData, 0, 0);
        }
      }

      const chip8 = new CHIP8();
      
      // イベントリスナー設定
      const fileInput = document.getElementById('rom');
      const startBtn = document.getElementById('start');
      const fsBtn = document.getElementById('fullscreenBtn');

      fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('file-name').textContent = file.name;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const arrayBuffer = e.target.result;
            const uint8View = new Uint8Array(arrayBuffer);
            chip8.load_rom(uint8View);
            startBtn.textContent = "Start";
            chip8.paused = true;
        };
        reader.readAsArrayBuffer(file);
      });

      startBtn.addEventListener('click', () => {
        if(chip8.paused) {
          chip8.paused = false;
          chip8.update_status("Running");
          startBtn.textContent = "Pause";
          // 音声コンテキストの開始（ブラウザ制限対策）
          if (chip8.audioCtx.state === 'suspended') {
              chip8.audioCtx.resume();
          }
        } else {
          chip8.paused = true;
          chip8.update_status("Paused");
          startBtn.textContent = "Resume";
        }
      });

      fsBtn.addEventListener('click', () => {
          if (!document.fullscreenElement) {
              canvas.requestFullscreen().catch(err => {
                  alert(`Error attempting to enable fullscreen: ${err.message}`);
              });
          } else {
              document.exitFullscreen();
          }
      });

      // キー入力
      document.addEventListener('keydown', (e) => {
          const key = e.key.toLowerCase();
          if (KEYMAP.hasOwnProperty(key)) {
              const chip8Key = KEYMAP[key];
              chip8.keys[chip8Key] = 1;
              
              if (chip8.waitingForKey) {
                  chip8.v[chip8.waitingForKeyRegister] = chip8Key;
                  chip8.waitingForKey = false;
                  chip8.waitingForKeyRegister = null;
              }
          }
      });

      document.addEventListener('keyup', (e) => {
          const key = e.key.toLowerCase();
          if (KEYMAP.hasOwnProperty(key)) {
              chip8.keys[KEYMAP[key]] = 0;
          }
      });

      // メインループ
      let lastTime = 0;
      function loop(timestamp) {
        const deltaTime = timestamp - lastTime;
        
        // 約60FPSでサイクルを回す
        if (deltaTime > 16) { 
            chip8.cycle();
            lastTime = timestamp;
        }

        requestAnimationFrame(loop);
      }
      
      chip8.reset();
      requestAnimationFrame(loop);

    </script>
  </body>
</html>
