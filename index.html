<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>CHIP-8</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      @font-face {
  font-family: "Renner";
  src: url("./Renner.ttf") format("truetype");
  font-display: swap;
 
}
      :root { color-scheme: light dark; }
      body {
        background: rgb(0,0,0);
        font-family: "Renner";
        margin: 0; padding: 0;
      }
      h1 { font-weight: 300; font-size: 25px; }
      header {
        display: flex; gap: 12px; align-items: center; margin-bottom: 12px;
      }
      canvas {
        height: 100%;
        aspect-ratio: 160 / 144;
        image-rendering: pixelated;
        border: 1px solid #000000;
        background: #000;
      }
      .row {
        padding-top: 0px; height: 83vh;
        justify-content: center; display: flex;
        gap: 12px; align-items: center;
      }
      .mono { font-size: 20px; }
      small { opacity: 0.7; }
      button {
        font-family: sans-serif; padding: 10px;
        background: rgb(0,0,0); color: rgb(255,255,255);
        border: 1px solid rgb(255,255,255); cursor: pointer;
      }
      .file-input { display: none; }
      .file-label {
        display: inline-block; padding: 10px 16px;
        background: #000000; color: white;
        border: 1px solid white; border-radius: 0px;
        cursor: pointer; font-size: 14px; transition: background 0.2s;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>CHIP-8</h1>
      <label class="file-label">
        Select
        <input id="rom" type="file" class="file-input" />
      </label>
      <span id="file-name"></span>
      <button id="fullscreenBtn">Fullscreen</button>
      <button id="start">Start</button>
      <div class="mono" id="status">No ROM</div>
      <div>
        <span class="mono">CPU PC:</span>
        <span id="pc" class="mono">0x0000</span>
      </div>
    </header>
    <div class="row">
      <canvas id="screen" width="64" height="32"></canvas>
      <div style="display:none">
        <div><b>FPS:</b> <span id="fps">0</span></div>
        <div><b>Cycles:</b> <span id="cyc" class="mono">0</span></div>
      </div>
    </div>

    <script>
      const canvas = document.getElementById('screen');
const ctx = canvas.getContext('2d');
      const MEMORY_SIZE = 4096;
const DISPLAY_WIDTH = 64;
const DISPLAY_HEIGHT = 32;
const REGISTER_COUNT = 16;
const STACK_SIZE = 16;
const FONTSET_SIZE = 80;
// CHIP-8のフォントセット（0-F）
const FONTSET = [
    0xF0, 0x90, 0x90, 0x90, 0xF0, // 0
    0x20, 0x60, 0x20, 0x20, 0x70, // 1
    0xF0, 0x10, 0xF0, 0x80, 0xF0, // 2
    0xF0, 0x10, 0xF0, 0x10, 0xF0, // 3
    0x90, 0x90, 0xF0, 0x10, 0x10, // 4
    0xF0, 0x80, 0xF0, 0x10, 0xF0, // 5
    0xF0, 0x80, 0xF0, 0x90, 0xF0, // 6
    0xF0, 0x10, 0x20, 0x40, 0x40, // 7
    0xF0, 0x90, 0xF0, 0x90, 0xF0, // 8
    0xF0, 0x90, 0xF0, 0x10, 0xF0, // 9
    0xF0, 0x90, 0xF0, 0x90, 0x90, // A
    0xE0, 0x90, 0xE0, 0x90, 0xE0, // B
    0xF0, 0x80, 0x80, 0x80, 0xF0, // C
    0xE0, 0x90, 0x90, 0x90, 0xE0, // D
    0xF0, 0x80, 0xF0, 0x80, 0xF0, // E
    0xF0, 0x80, 0xF0, 0x80, 0x80, // F
];
class CHIP8 {
    constructor() {
        // memory: [u8; 4096]
        this.memory = new Uint8Array(MEMORY_SIZE);
      this.vram = new Uint8Array(0x100);
        // display: [[bool; 64]; 32] -> 1次元のUint8Arrayで管理するのが一般的
        this.display = new Uint8Array(DISPLAY_WIDTH * DISPLAY_HEIGHT);

        // v: [u8; 16]
        this.v = new Uint8Array(REGISTER_COUNT);

        // i: u16
        this.i = 0;

        // pc: u16 (プログラム開始地点は通常 0x200)
        this.pc = 0x200;

        // stack: [u16; 16]
        this.stack = new Uint16Array(STACK_SIZE);

        // sp: u8
        this.sp = 0;

        // タイマー類
        this.delay_timer = 0;
        this.sound_timer = 0;
    }
    reset(){
      this.pc = 0x200;
    }
    fetch(){
      let hi = this.memory[this.pc];
    let lo = this.memory[this.pc + 1];
    this.pc += 2;
    (hi << 8) | lo
    }
    step(){
      let opcode = fetch();
      let nibbles = [
        ((opcode & 0xF000) >> 12),
        ((opcode & 0x0F00) >> 8),
        ((opcode & 0x00F0) >> 4),
        (opcode & 0x000F),
    ]
    let x = nibbles[1];
    let y = nibbles[2];
    let n = nibbles[3];
    let nn = (opcode & 0x00FF);
    let nnn = opcode & 0x0FFF;
      switch(nibbles){
        case 0x0, 0x0, 0xE, 0x0:
          this.display = false;
        case 0x0, 0x0, 0xE, 0xE:
          this.sp -= 1;
    this.pc = this.stack[this.sp];
    case 0x1, _, _, _:
    // 1NNN - JP: アドレスNNNにジャンプ
    this.pc = nnn;
    


      }
    }
    print_display() {
    const pixel = ctx.createImageData(64, 32); // 1x1のイメージデータ作成
for(var i = 0; i <= this.vram; i++){ 
var l = 0;
if(this.vram[i] == 1)l=255;
const d = pixel.data;
d[0] = 255; // R
d[1] = 255;   // G
d[2] = 255;   // B
d[3] = l; // A (不透明度)

ctx.putImageData(pixel, i % 64, Math.floor(i / 64)); // 指定座標に配置
}
}

}
let a =new CHIP8;
a.print_display();
    </script>
  </body>
</html>
